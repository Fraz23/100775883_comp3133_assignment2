<header class="app-topbar">
  <a class="brand" routerLink="/employees">Employee Hub</a>

  <nav class="top-links">
    @if (isAuthenticated()) {
      <a routerLink="/employees">Employees</a>
      <a routerLink="/employees/new">Add Employee</a>
      <button type="button" (click)="logout()">Logout</button>
    } @else {
      <a routerLink="/login">Login</a>
      <a routerLink="/signup">Signup</a>
    }
  </nav>
</header>

<main>
  <router-outlet />
</main>
